<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Tiếng Trung cho công việc & HSK — Developed by VDuckie</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f5f1e8;color:#18352e;font-family:Arial,"Segoe UI","Noto Sans SC",sans-serif}
    .vduckie-static-loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}
    .vduckie-static-loading img{display:block;width:min(240px,70vw);height:auto;margin:0 auto 18px}
    .vduckie-static-loading p{margin:0;color:#66736e}
  </style>
  <script>
    (async function restoreStaticVDuckie(){
      var shellUrl="./app-shell-v88.html?v=89.0";
      var staticMascot='<img class="home-welcome-mascot" src="./assets/home/vduckie-welcome.webp?v=89.0" alt="Vịt VDuckie mặc áo học sinh đang vẫy chào">';
      try{
        var response=await fetch(shellUrl,{cache:"no-store"});
        if(!response.ok)throw new Error("Không tải được giao diện: HTTP "+response.status);
        var source=await response.text();
        var animatedMascot=/<svg class="home-welcome-mascot vduckie-mascot"[\s\S]*?<\/svg>/;
        if(!animatedMascot.test(source))throw new Error("Không tìm thấy mascot SVG cần thay thế");
        source=source.replace(animatedMascot,staticMascot);
        source=source.replace(/vduckie-mascot-v87\.css\?v=[^"']+/g,"vduckie-mascot-v87.css?v=89.0");
        source=source.replace("</head>",'<link rel="stylesheet" href="./assets/v89/exp-leaderboard-v89.css?v=89.0"><link rel="stylesheet" href="./assets/v89/legacy-dashboard-exp-cleanup-v89.1.css?v=89.1"><link rel="stylesheet" href="./assets/v89/hsk-roadmap-v89.4.css?v=89.4"></head>');
        source=source.replace("</body>",'<script src="./assets/v89/exp-core-v89.js?v=89.0"><\/script><script src="./assets/v89/exp-board-v89.js?v=89.0"><\/script><script src="./assets/v89/exp-leaderboard-v89.js?v=89.0"><\/script><script src="./assets/v89/exp-learning-hooks-v89.js?v=89.0"><\/script><script src="./assets/v89/legacy-dashboard-exp-cleanup-v89.1.js?v=89.1"><\/script><script src="./assets/v89/hsk-roadmap-v89.4.js?v=89.4"><\/script></body>');
        document.open();
        document.write(source);
        document.close();
      }catch(error){
        document.addEventListener("DOMContentLoaded",function(){
          document.body.innerHTML='<main class="vduckie-static-loading"><div><img src="./assets/home/vduckie-welcome.webp?v=89.0" alt="Vịt VDuckie"><p>Không tải được giao diện. Hãy tải lại trang.</p></div></main>';
          console.error(error);
        });
      }
    })();
  </script>
</head>
<body>
  <main class="vduckie-static-loading" aria-live="polite"><p>Đang mở VDuckie…</p></main>
</body>
</html>
