name: Build HSK Dictionary v79

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/build_hsk_dictionary_v79.py
      - scripts/build_dictionary_stats_v79.js
      - scripts/apply_hsk_roast_v80.js
      - scripts/apply_account_progress_v81.js
      - scripts/apply_account_sync_v82.js
      - .github/workflows/build-hsk-dictionary-v79.yml
      - tests/v79-*.test.js
      - tests/v80-*.test.js
      - tests/v81-*.test.js
      - tests/v82-*.test.js
      - assets/v79/hsk-dictionary-v79.js
      - assets/v79/unified-dictionary-v79.js
      - assets/v79/unified-dictionary-v79.part*.txt
      - assets/v79/unified-dictionary-v79.css
      - assets/v79/home-copy-v79.js
      - assets/v80/hsk-roast-context-v80.1.js
      - assets/v82/account-learning-sync-v82.js
      - community.js
      - pinyin-pro.loader.js
      - supabase-sync.js

permissions:
  contents: write

concurrency:
  group: build-hsk-dictionary-v79
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply frontend cache keys and account sync patches
        run: |
          node scripts/apply_hsk_roast_v80.js
          node scripts/apply_account_progress_v81.js
          node scripts/apply_account_sync_v82.js

      - name: Generate HSK dictionary chunks
        run: python scripts/build_hsk_dictionary_v79.py

      - name: Calculate exact unified dictionary totals
        run: node scripts/build_dictionary_stats_v79.js

      - name: Validate generated data and all account synchronization
        run: node --test tests/v79-hsk-dictionary-data.test.js tests/v79-unified-dictionary.test.js tests/v80-hsk-roast-context.test.js tests/v81-account-progress-sync.test.js tests/v82-account-learning-sync.test.js

      - name: Commit generated dictionary and deploy keys
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html supabase-sync.js assets/v79/hsk-dictionary assets/v79/dictionary-stats.json
          if git diff --cached --quiet; then
            echo "Generated data and deploy keys are already up to date."
          else
            git commit -m "Generate HSK data and deploy full account sync v82"
            git push origin HEAD:main
          fi
