name: Restore static VDuckie once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-static-vduckie-once.yml'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace animated mascot with original static image
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          source = index_path.read_text(encoding='utf-8')

          static_img = '''<img class="home-welcome-mascot" src="./assets/home/vduckie-welcome.webp?v=88.0" alt="Vịt VDuckie mặc áo học sinh đang vẫy chào">'''
          pattern = re.compile(r'<svg class="home-welcome-mascot vduckie-mascot"[\s\S]*?</svg>')
          source, count = pattern.subn(static_img, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected exactly one mascot SVG, replaced {count}')

          source = re.sub(
              r'(assets/home/vduckie-mascot-v87\.css\?v=)[^"\']+',
              r'\g<1>88.0',
              source,
              count=1,
          )
          index_path.write_text(source, encoding='utf-8')

          css_path = Path('assets/home/vduckie-mascot-v87.css')
          css = '''html {
            overflow-y: scroll;
            scrollbar-gutter: stable;
          }

          .vduckie-layout-booting.v865-home-mode #homeHub {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
          }

          .home-welcome-mascot {
            animation: none !important;
            transform: none !important;
            will-change: auto !important;
          }
          '''
          css_path.write_text(css, encoding='utf-8')

          test_path = Path('tests/v87-vduckie-mascot-animation.test.js')
          test = test_path.read_text(encoding='utf-8')
          start = test.index("test('welcome mascot restores the original WebP artwork'")
          marker = "test('first paint starts in the final home grid mode"
          end = test.index(marker)
          replacement = '''test('welcome mascot is the untouched original static WebP image', () => {
            assert.match(indexSource, /<img class="home-welcome-mascot" src="\.\/assets\/home\/vduckie-welcome\.webp\?v=88\.0"/);
            assert.doesNotMatch(indexSource, /<svg class="home-welcome-mascot vduckie-mascot"/);
            assert.doesNotMatch(indexSource, /id="vduckieWingShape"/);
            assert.doesNotMatch(indexSource, /id="vduckie-wing"/);
            assert.match(indexSource, /vduckie-mascot-v87\.css\?v=88\.0/);
            assert.match(cssSource, /\.home-welcome-mascot\s*\{[^}]*animation:\s*none !important/s);
          });

          '''
          test_path.write_text(test[:start] + replacement + test[end:], encoding='utf-8')
          PY

      - name: Verify static mascot source
        shell: bash
        run: |
          grep -F '<img class="home-welcome-mascot" src="./assets/home/vduckie-welcome.webp?v=88.0"' index.html
          ! grep -F '<svg class="home-welcome-mascot vduckie-mascot"' index.html
          ! grep -F 'id="vduckieWingShape"' index.html
          node --test tests/v87-vduckie-mascot-animation.test.js

      - name: Commit and push final source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/restore-static-vduckie-once.yml
          git add index.html assets/home/vduckie-mascot-v87.css tests/v87-vduckie-mascot-animation.test.js
          git commit -m "Replace animated VDuckie SVG with original static image v88"
          git pull --rebase origin main
          git push origin main
