name: Apply Phase 2A Payload

on:
  push:
    branches: [hsk-phase2a-verified-vocabulary]
    paths:
      - '.phase2a-payload/**'
      - '.github/workflows/apply-phase2a-payload.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hsk-phase2a-verified-vocabulary
          fetch-depth: 0
      - name: Expand Phase 2A payload
        run: |
          cat .phase2a-payload/archive-* | base64 -d > /tmp/phase2a.tar.xz
          tar -xJf /tmp/phase2a.tar.xz -C .
          rm -rf .phase2a-payload
          rm -f .github/workflows/apply-phase2a-payload.yml
      - name: Commit Phase 2A files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete verified HSK 1 vocabulary foundation"
          git push origin HEAD:hsk-phase2a-verified-vocabulary
