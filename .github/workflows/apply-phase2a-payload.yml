name: Apply Phase 2A Payload

on:
  schedule:
    - cron: '*/5 * * * *'
  pull_request:
    branches: [main]
    paths:
      - '.phase2a-payload/**'
      - '.github/workflows/apply-phase2a-payload.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hsk-phase2a-verified-vocabulary
          fetch-depth: 0
      - name: Detect pending payload
        id: payload
        shell: bash
        run: |
          if compgen -G '.phase2a-payload/archive-*' > /dev/null; then
            echo 'pending=true' >> "$GITHUB_OUTPUT"
          else
            echo 'pending=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Expand Phase 2A payload
        if: steps.payload.outputs.pending == 'true'
        run: |
          cat .phase2a-payload/archive-* | base64 -d > /tmp/phase2a.tar.xz
          tar -xJf /tmp/phase2a.tar.xz -C .
          rm -rf .phase2a-payload
          rm -f .github/workflows/apply-phase2a-payload.yml
      - name: Install regression dependencies
        if: steps.payload.outputs.pending == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          python -m pip install --disable-pip-version-check playwright
          python -m playwright install --with-deps chromium
      - name: Run final Phase 2A validation and regression
        if: steps.payload.outputs.pending == 'true'
        shell: bash
        run: |
          find assets/hsk-content scripts tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          node scripts/validate-hsk-content.js
          node scripts/check-hsk-duplicates.js
          node scripts/check-hsk-coverage.js
          node scripts/check-hsk1-vocabulary.js
          node scripts/generate-hsk-report.js
          node --test --test-concurrency=1 --test-reporter=dot tests/*.test.js
          git diff --check
      - name: Commit materialized Phase 2A source
        if: steps.payload.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete verified HSK 1 vocabulary foundation"
          git push origin HEAD:hsk-phase2a-verified-vocabulary
