name: Apply VDuckie seam repair once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/vduckie-seam-fix-once.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Replace the straight closing edge with the sleeve seam curve
        shell: python
        run: |
          from pathlib import Path

          index_path = Path("index.html")
          index_source = index_path.read_text(encoding="utf-8")

          old_shape = 'id="vduckieWingShape" d="M164 214C142 215 116 222 94 232L95 174L83 122H0V286H72C88 294 105 302 122 307Z"'
          new_shape = 'id="vduckieWingShape" d="M164 214C142 215 116 222 94 232L95 174L83 122H0V286H72C88 294 105 302 122 307C126 284 144 235 164 214Z"'
          if index_source.count(old_shape) != 1:
              raise SystemExit(f"Expected exactly one old vduckieWingShape, found {index_source.count(old_shape)}")
          index_source = index_source.replace(old_shape, new_shape, 1)

          old_css_version = 'vduckie-mascot-v87.css?v=87.5'
          new_css_version = 'vduckie-mascot-v87.css?v=87.6'
          if index_source.count(old_css_version) != 1:
              raise SystemExit(f"Expected exactly one mascot cache version, found {index_source.count(old_css_version)}")
          index_source = index_source.replace(old_css_version, new_css_version, 1)
          index_path.write_text(index_source, encoding="utf-8")

          test_path = Path("tests/v87-vduckie-mascot-animation.test.js")
          test_source = test_path.read_text(encoding="utf-8")

          old_test_shape = 'assert.match(indexSource, /id="vduckieWingShape" d="M164 214C142 215 116 222 94 232L95 174L83 122H0V286H72C88 294 105 302 122 307Z"/);'
          new_test_shape = 'assert.match(indexSource, /id="vduckieWingShape" d="M164 214C142 215 116 222 94 232L95 174L83 122H0V286H72C88 294 105 302 122 307C126 284 144 235 164 214Z"/);\n  assert.doesNotMatch(indexSource, /id="vduckieWingShape" d="[^"]*122 307Z"/);'
          if test_source.count(old_test_shape) != 1:
              raise SystemExit(f"Expected exactly one old wing-shape assertion, found {test_source.count(old_test_shape)}")
          test_source = test_source.replace(old_test_shape, new_test_shape, 1)

          old_test_version = 'assert.match(indexSource, /vduckie-mascot-v87\\.css\\?v=87\\.5/);'
          new_test_version = 'assert.match(indexSource, /vduckie-mascot-v87\\.css\\?v=87\\.6/);'
          if test_source.count(old_test_version) != 1:
              raise SystemExit(f"Expected exactly one old mascot version assertion, found {test_source.count(old_test_version)}")
          test_source = test_source.replace(old_test_version, new_test_version, 1)
          test_path.write_text(test_source, encoding="utf-8")

      - name: Run mascot regression tests
        run: node --test tests/v87-vduckie-mascot-animation.test.js

      - name: Commit repaired seam and remove this one-time workflow
        shell: bash
        run: |
          rm .github/workflows/vduckie-seam-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tests/v87-vduckie-mascot-animation.test.js .github/workflows/vduckie-seam-fix-once.yml
          git commit -m "Fix VDuckie wing seam geometry v87.6"
          git pull --rebase origin main
          git push origin main
