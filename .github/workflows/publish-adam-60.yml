name: Resolve Adam branch and publish clips

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  resolve:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge latest main into branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "VDuckie Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch already contains main"
            exit 0
          fi
          if ! git merge origin/main --no-edit; then
            git checkout --theirs .github/workflows/publish-adam-60.yml
            git add .github/workflows/publish-adam-60.yml
            git commit --no-edit
          fi
          git push origin HEAD:${{ github.head_ref }}
