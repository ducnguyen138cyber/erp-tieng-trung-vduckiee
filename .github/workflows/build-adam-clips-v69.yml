name: Build verified Adam clips v70

on:
  push:
    paths:
      - .github/workflows/build-adam-clips-v69.yml
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'issues' || github.event.issue.title == 'BUILD_ADAM_CLIPS_V70'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Rebuild sources and cut 60 clips
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/adam-source assets/adam-clips
          python3 - <<'PY'
          import base64, subprocess
          from pathlib import Path

          def valid(path):
              p=subprocess.run(['ffprobe','-v','error','-show_entries','format=duration','-of','default=noprint_wrappers=1:nokey=1',str(path)],capture_output=True,text=True)
              try:return p.returncode==0 and float(p.stdout.strip())>100
              except:return False

          for level in ('good','medium','bad'):
              parts=[Path(f'assets/adam/{level}.part{i}.b64').read_text(encoding='utf-8') for i in range(1,5)]
              target=Path(f'/tmp/adam-source/{level}.mp3')
              candidates=[]
              joined=''.join(parts)
              joined=''.join(joined.split()).replace('=','')
              joined += '='*((4-len(joined)%4)%4)
              try:candidates.append(base64.b64decode(joined,validate=False))
              except:pass
              try:
                  chunks=[]
                  for part in parts:
                      clean=''.join(part.split())
                      clean += '='*((4-len(clean)%4)%4)
                      chunks.append(base64.b64decode(clean,validate=False))
                  candidates.append(b''.join(chunks))
              except:pass
              for data in candidates:
                  target.write_bytes(data)
                  if valid(target):break
              else:raise RuntimeError(f'Cannot rebuild {level}.mp3')

          clips={
          'good':{'starts':[0.050,6.738254,10.853549,18.4006575,25.18822,31.0788325,42.97144,46.211451,49.9547055,57.4843425,63.325295,74.318322,80.6688435,86.732925,92.4571085,97.222415,103.661077,109.4592515,113.0911905,116.461644],'lengths':[6.588254,4.015295,7.4471085,6.6875625,5.7906125,11.7926075,3.140011,3.6432545,7.429637,5.7409525,10.893027,6.2505215,5.9640815,5.6241835,4.6653065,6.338662,5.6981745,3.531939,3.2704535,5.767481]},
          'medium':{'starts':[0.050,5.015873,10.178946,20.6234355,26.431576,36.350839,46.451247,52.345873,58.5091835,61.725907,64.821712,68.9873925,71.2972335,76.430136,82.774456,88.7065415,94.7060205,100.763594,107.4748185,110.1979365],'lengths':[4.865873,5.063073,10.3444895,5.7081405,9.819263,10.000408,5.794626,6.0633105,3.1167235,2.995805,4.0656805,2.209841,5.0329025,6.24432,5.8320855,5.899479,5.9575735,6.6112245,2.623118,2.8645015]},
          'bad':{'starts':[0.050,4.417007,9.446009,14.972109,27.244649,33.974603,39.017619,45.236621,51.966576,58.640544,64.14551,69.289501,75.775533,82.287528,88.129535,94.184535,100.267528,105.403526,111.64551,116.446531],'lengths':[4.267007,4.929002,5.4261,12.17254,6.629954,4.943016,6.119002,6.629955,6.573968,5.404966,5.043991,6.386032,6.411995,5.742007,5.955,5.982993,5.035998,6.141984,4.701021,6.777532]}}
          out=Path('assets/adam-clips')
          for level,data in clips.items():
              src=Path(f'/tmp/adam-source/{level}.mp3')
              for i,(start,length) in enumerate(zip(data['starts'],data['lengths']),1):
                  dst=out/f'{level}-{i:02d}.mp3'
                  subprocess.run(['ffmpeg','-hide_banner','-loglevel','error','-y','-ss',f'{start:.6f}','-i',str(src),'-t',f'{length:.6f}','-vn','-ac','1','-ar','22050','-b:a','64k',str(dst)],check=True)
          files=sorted(out.glob('*.mp3'))
          assert len(files)==60
          assert all(p.stat().st_size>12000 for p in files)
          PY

      - name: Install direct standalone player
        shell: bash
        run: |
          cp assets/v62/audio-direct-v69.js assets/v62/audio-direct-v70.js
          cat > community.js <<'JS'
          (function(){
            "use strict";
            function loadRuntime(){
              var parts=[1,2,3,4].map(function(n){return fetch("./assets/v62/runtime.part"+n+".txt?v=70",{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("Thiếu runtime "+n);return r.text();});});
              Promise.all(parts).then(function(code){Function(code.join(""))();}).catch(function(error){console.error("Không nạp được v70:",error);});
            }
            var script=document.createElement("script");
            script.src="./assets/v62/audio-direct-v70.js?v=70";
            script.onload=loadRuntime;
            script.onerror=loadRuntime;
            document.head.appendChild(script);
          })();
          JS

      - name: Verify and commit
        shell: bash
        run: |
          set -euo pipefail
          test "$(find assets/adam-clips -name '*.mp3' | wc -l)" -eq 60
          node --check assets/v62/audio-direct-v70.js
          node --check community.js
          for f in assets/adam-clips/*.mp3; do ffprobe -v error -show_entries format=duration -of csv=p=0 "$f" >/dev/null; done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/adam-clips assets/v62/audio-direct-v70.js community.js
          git commit -m "Publish 60 standalone Adam clips [skip ci]" || exit 0
          git push
